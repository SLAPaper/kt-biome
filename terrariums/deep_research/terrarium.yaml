# Deep Research Terrarium
# Multi-agent web research system: search, read, synthesize, cite.
#
# Topology:
#   root      -> questions -> planner
#   planner   =============> researcher       (via output_wiring)
#   researcher ============> synthesizer      (via output_wiring)
#   researcher -> tasks     -> researcher     (self-loop: sub-questions on channel)
#   synthesizer ===========> critic           (via output_wiring)
#   synthesizer -> tasks    -> researcher     (follow-up searches, channel)
#   critic    -> feedback  -> planner         (gaps found, channel)
#   critic    -> final                        (approved report, channel)
#   every creature -> root                    (lifecycle ping, with_content: false)
#   team_chat (broadcast)                     for coordination
#
# Linear pipeline edges use output_wiring so progress doesn't rely on
# the creature remembering to `send_message` for the main hand-off.
# Conditional or loop-back edges stay on channels.
#
# Every creature inherits the full `@kt-biome/creatures/general`
# toolset + subagents; role is shaped by the per-creature prompt.
#
# Usage:
#   kt terrarium run @kt-biome/terrariums/deep_research/

terrarium:
  name: deep_research

  root:
    base_config: "@kt-biome/creatures/general"
    system_prompt_file: prompts/root.md
    controller:
      tool_format: native
    # Privileged group_* tools are force-registered on the root by the
    # engine — no explicit ``tools:`` block needed here.

  creatures:
    - name: planner
      base_config: "@kt-biome/creatures/general"
      system_prompt_file: prompts/planner.md
      output_wiring:
        - researcher
        - { to: root, with_content: false }
      channels:
        listen: [questions, feedback, team_chat]
        can_send: [team_chat]

    - name: researcher
      base_config: "@kt-biome/creatures/general"
      system_prompt_file: prompts/researcher.md
      output_wiring:
        - synthesizer
        - { to: root, with_content: false }
      channels:
        # The researcher listens on ``tasks`` for follow-up sub-questions
        # from the synthesizer. It does NOT self-loop — channel
        # subscriptions filter out a sender's own messages.
        listen: [tasks, team_chat]
        can_send: [team_chat]

    - name: synthesizer
      base_config: "@kt-biome/creatures/general"
      system_prompt_file: prompts/synthesizer.md
      output_wiring:
        - critic
        - { to: root, with_content: false }
      channels:
        # synthesizer may also request follow-up searches by sending on tasks.
        listen: [team_chat]
        can_send: [tasks, team_chat]

    - name: critic
      base_config: "@kt-biome/creatures/general"
      system_prompt_file: prompts/critic.md
      # Critic is the CONDITIONAL stage: gaps -> feedback to planner;
      # approved -> final. Wiring can't branch, so only lifecycle pings root.
      output_wiring:
        - { to: root, with_content: false }
      channels:
        listen: [team_chat]
        can_send: [feedback, final, team_chat]

  channels:
    questions: { description: "Research questions from root" }
    # ``tasks`` carries synthesizer follow-up sub-questions to the
    # researcher.  Researcher sends here too, but self-broadcasts are
    # filtered at the channel layer, so this is NOT a researcher
    # self-loop — only synthesizer drives the researcher via tasks.
    tasks:     { description: "Sub-questions (synthesizer -> researcher)" }
    feedback:  { description: "Critic -> planner (gap reports)" }
    final:     { description: "Final approved reports" }
    team_chat: { description: "Cross-creature coordination" }

name: general
version: "1.1"

controller:
  # LLM is resolved from: --llm flag > default model (kt model default) > inline config
  # Set a default: kt model default gemini-3.1-pro
  tool_format: native

system_prompt_file: prompts/system.md
skill_mode: dynamic
skill_index_budget_bytes: 16384   # 16KB

tools:
  - name: bash
    type: builtin
  - name: python
    type: builtin
  - name: read
    type: builtin
  - name: write
    type: builtin
  - name: edit
    type: builtin
  - name: multi_edit
    type: builtin
  - name: notebook_read
    type: builtin
  - name: notebook_edit
    type: builtin
  - name: glob
    type: builtin
  - name: grep
    type: builtin
  - name: tree
    type: builtin
  - name: scratchpad
    type: builtin
  - name: info
    type: builtin
  - name: ask_user
    type: builtin
  - name: json_read
    type: builtin
  - name: json_write
    type: builtin
  - name: send_message
    type: builtin
  - name: stop_task
    type: builtin
  - name: add_timer
    type: trigger
  - name: add_schedule
    type: trigger
  - name: search_memory
    type: builtin
  - name: web_fetch
    type: builtin
  - name: web_search
    type: builtin
  - name: show_card
    type: builtin
  - name: skill
    type: builtin
  - name: skill_manage
    type: package
    module: kt_biome.tools.skill_manage
    class: SkillManageTool
  - name: skill_nudge
    type: trigger
    module: kt_biome.triggers.skill_nudge
    class: SkillNudgeTrigger
  - name: image_gen
    type: builtin
subagents:
  - name: explore
    type: builtin
  - name: plan
    type: builtin
  - name: worker
    type: builtin
  - name: critic
    type: builtin
  - name: summarize
    type: builtin
  - name: research
    type: builtin
  - name: response
    type: builtin
  - name: memory_read
    type: builtin
  - name: memory_write
    type: builtin
skills:
  - '*'
plugins:
  # Auto-discover AGENTS.md / .cursorrules / .hermes.md from cwd up to
  # the git root and inject them into every turn's context. Standard
  # expectation for modern coding agents. Zero cost when no files exist.
  - name: context_files
    type: package
    module: kt_biome.plugins.context_files
    class: ContextFilesPlugin
  - name: family_guidance
    type: package
    module: kt_biome.plugins.family_guidance
    class: FamilyGuidancePlugin
  - name: circuit_breaker
    type: package
    module: kt_biome.plugins.circuit_breaker
    class: CircuitBreakerPlugin
  - name: cost_tracker
    type: package
    module: kt_biome.plugins.cost_tracker
    class: CostTrackerPlugin
  - name: injection_scanner
    type: package
    module: kt_biome.plugins.injection_scanner
    class: InjectionScannerPlugin
  - name: message_role_guard
    type: package
    module: kt_guard_plugin.plugins.guard
    class: MessageRoleGuardPlugin
  - name: history_guard
    type: package
    module: kt_guard_plugin.plugins.history_guard
    class: HistoryGuardPlugin
output:
  type: stdout
  controller_direct: true

memory:
  embedding:
    provider: model2vec
    model: "@multilingual-best"
    # model2vec presets (no torch, numpy-only):
    #   @tiny (2M/64d), @base (8M/256d), @retrieval (32M/512d),
    #   @best (static-retrieval-mrl/1024d/Matryoshka),
    #   @multilingual (128M/256d/101langs),
    #   @multilingual-best (static-similarity-mrl/1024d/51langs),
    #   @science (32M/256d)
    # sentence-transformer presets (needs torch):
    #   @tiny (granite-30m), @small (granite-47m/8K),
    #   @base (gte-modernbert/8K), @nomic (nomic-v1.5/8K),
    #   @gemma (embeddinggemma-300m), @multilingual (gte-multilingual/8K/70langs)
    # Or use any HuggingFace model path directly

# compact.max_tokens auto-derived from model's max_context
